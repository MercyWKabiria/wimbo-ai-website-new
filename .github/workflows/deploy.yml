name: Deploy wimbo-ai website

on:
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -p 22" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/akki-nginx/wimbo/dist/

      - name: Reload nginx container
        run: |
          ssh -p 22 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'docker exec akki-nginx nginx -t && docker exec akki-nginx nginx -s reload'